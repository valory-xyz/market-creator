name: omen_realitio_withdraw_bond_abci
author: valory
version: 0.1.0
type: skill
description: A single-purpose ABCI skill that recovers Realitio bonds for an answerer
  safe via Realitio.claimWinnings + Realitio.withdraw, bundled into one multisend
  per period. Independent of the trader (CT redemption) and LP (FPMM removeFunding)
  recovery flows.
