name: Common Checks

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lock_check:
    continue-on-error: False
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ["3.10"]

    defaults:
      run:
        shell: bash

    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Check if dependencies can be locked
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --all-groups -v

  copyright_and_dependencies_check:
    continue-on-error: False
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.10"]

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@54780e1e34d4a5bd908f4ece1fae86437bded2c1' tox-uv
      - name: Check copyright headers
        run: tomte check-copyright --author valory
      - name: License compatibility check
        run: tomte tox -e liccheck
      - name: Check dependencies
        run: tomte tox -e check-dependencies
      - name: Check third-party package hashes against upstreams
        run: tomte tox -e check-third-party-hashes
      - name: Check doc links
        run: |
          tomte check-doc-links \
            --url-skips https://github.com/valory-xyz/market-creator.git \
            --url-skips https://newsapi.org/v2 \
            --url-skips https://newsapi.org/v2/everything \
            --url-skips https://newsapi.org/v2/top-headlines \
            --http-skips http://host.docker.internal:8545 \
            --http-skips http://host.docker.internal:5000 \
            --http-skips http://127.0.0.1:5000 \
            --url-skips http://host.docker.internal:5000 \
            --url-skips http://127.0.0.1:5000 \
            --url-skips http://server_ip:5000 \
            --url-skips https://github.com/protofire/omen-exchange/blob/a98fff28a71fa53b43e7ae069924564dd597d9ba/README.md \
            --url-skips https://github.com/valory-xyz/market-creator/blob/0bab9ff6b41c2f024cc1f0d2aa149347fd0f47a9/packages/valory/agents/market_maker/aea-config.yaml#L149
      - name: Check doc IPFS hashes
        run: tomte tox -e check-doc-hashes

  linter_checks:
    continue-on-error: False
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.10"]

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@54780e1e34d4a5bd908f4ece1fae86437bded2c1' tox-uv
      - name: Security checks
        run: tomte tox -p -e safety -e bandit
      - name: Check packages
        run: tomte tox -e check-packages
      - name: Check hash
        run: tomte tox -e check-hash
      - name: Code checks
        run: tomte tox -p -e black-check -e isort-check -e flake8 -e mypy -e pylint -e darglint
      - name: AbciApp consistency checks
        run: |
          tomte tox -e check-abci-docstrings
          tomte tox -e check-abciapp-specs
          tomte tox -e check-handlers

  scan:
    name: gitleaks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: |
          wget https://github.com/zricethezav/gitleaks/releases/download/v8.10.1/gitleaks_8.10.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.10.1_linux_x64.tar.gz
          sudo install gitleaks /usr/bin
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@54780e1e34d4a5bd908f4ece1fae86437bded2c1' tox-uv
          tomte tox -e gitleaks

  test:
    continue-on-error: False
    needs:
      - lock_check
      - copyright_and_dependencies_check
      - linter_checks
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - if: matrix.os == 'ubuntu-24.04'
        name: Install dependencies (ubuntu-24.04)
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get autoremove
          sudo apt-get autoclean
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@54780e1e34d4a5bd908f4ece1fae86437bded2c1' tox-uv
          pip install --user --upgrade setuptools

      - if: matrix.os == 'ubuntu-24.04'
        name: Packages unit tests ubuntu-24.04
        run: |
          tomte tox -e py${{ matrix.python-version }}-linux

      - if: matrix.os == 'macos-15'
        name: Install dependencies (macos-15)
        run: |
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@54780e1e34d4a5bd908f4ece1fae86437bded2c1' tox-uv
          pip install --user --upgrade setuptools

      - if: matrix.os == 'macos-15'
        name: Packages unit tests macos-15
        run: |
          tomte tox -e py${{ matrix.python-version }}-darwin

      - if: matrix.os == 'windows-2025'
        name: Install dependencies (windows-2025)
        run: |
          python -m pip install -U pip
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@54780e1e34d4a5bd908f4ece1fae86437bded2c1' tox-uv
          pip install --upgrade setuptools

      - if: matrix.os == 'windows-2025'
        name: Packages unit tests windows-2025
        run: |
          tomte tox -e py${{ matrix.python-version }}-win

      - if: matrix.os == 'ubuntu-24.04'
        name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  all_checks_passed:
    name: All checks passed
    if: always()
    needs:
      - lock_check
      - copyright_and_dependencies_check
      - linter_checks
      - scan
      - test
    runs-on: ubuntu-24.04
    steps:
      - name: Fail if any required job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - run: echo "All required checks passed."
