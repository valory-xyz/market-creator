[build-system]
requires = [ "poetry-core>=1.0.0",]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "market-creator"
version = "0.1.0"
description = ""
authors = []
readme = "README.md"
repository = "https://github.com/valory-xyz/dev-template"
keywords = [ "autonomy", "autonomous", "autonolas", "service", "multi", "agent",]
classifiers = [ "Environment :: Console", "Environment :: Web Environment", "Development Status :: 2 - Pre-Alpha", "Intended Audience :: Developers", "License :: OSI Approved :: Apache Software License", "Natural Language :: English", "Operating System :: MacOS", "Operating System :: Microsoft", "Operating System :: Unix", "Programming Language :: Python :: 3.7", "Programming Language :: Python :: 3.8", "Programming Language :: Python :: 3.9", "Programming Language :: Python :: 3.10", "Topic :: Communications", "Topic :: Internet", "Topic :: Scientific/Engineering", "Topic :: Software Development", "Topic :: System",]
[[tool.poetry.packages]]
include = "packages"

[tool.poetry.dependencies]
python = ">=3.10,<3.15"
open-autonomy = "==0.21.12rc4"
toml = "==0.10.2"
hypothesis = "==6.151.9"
grpcio = "==1.78.0"
aiohttp = "<4.0.0,>=3.8.5"
asn1crypto = "<1.5.0,>=1.4.0"
open-aea-ledger-ethereum = "==2.1.0rc6"
openai = "==1.93.0"
protobuf = ">=5,<6"
open-aea-test-autonomy = "==0.21.12rc4"
ipfshttpclient = "==0.8.0a2"
open-aea-cli-ipfs = "==2.1.0rc6"
requests = "==2.32.5"
pytest = ">=8.2,<10"
pytest-asyncio = "==1.3.0"
ecdsa = ">=0.15"
open-aea-ledger-cosmos = "==2.1.0rc6"
certifi = "==2026.2.25"
multidict = "==6.7.1"
py-eth-sig-utils = "==0.4.0"
web3 = "<8,>=7.0.0"
eth_typing = "==5.2.1"
pytz = "==2022.2.1"
typing_extensions = "<=4.15.0,>=3.10.0.2"
hexbytes = "==1.3.1"
packaging = "==26"
openapi-core = "==0.22.0"
openapi-spec-validator = ">=0.7.0,<0.8.0"
flask-cors = "^5.0.0"
gql = "^3.5.0"
pydantic = "==2.11.9"
tiktoken = "^0.9.0"
eth-utils = "==5.3.0"
setuptools = "^78.0.1"

[tool.poetry.dependencies.tomte]
version = "==0.6.1"
extras = ["cli", "tests"]