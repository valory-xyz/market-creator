; By default, testenvs are configured to:
; - don't skip dist (skipsdist = False)
; - don't skip the package installation (skip_install = False)
; - don't use source installation (usedevelop = False)
; where one of those steps is not necessary for the test,
; we set the associated flag (e.g. for linting we don't need
; the package installation).
[tox]
envlist = bandit, safety, black, black-check, isort, isort-check, check-hash, check-packages, check-dependencies, flake8, mypy, pylint, darglint, check-generate-all-protocols, abci-docstrings, check-abciapp-specs, py{3.10,3.11}-{win,linux,darwin}
; when running locally we don't want to fail for no good reason
skip_missing_interpreters = true
isolated_build = True

[deps-tests]
deps =
    cython<3
    wheel==0.40.0
    tomte[tests]==0.6.1

[deps-packages]
deps =
    {[deps-tests]deps}
    open-autonomy==0.21.12rc4
    toml==0.10.2
    hypothesis==6.151.9
    grpcio==1.78.0
    typing_extensions<=4.15.0,>=3.10.0.2
    py-ecc==8.0.0
    aiohttp<4.0.0,>=3.8.5
    asn1crypto<1.5.0,>=1.4.0
    open-aea-ledger-ethereum==2.1.0rc6
    open-aea-ledger-cosmos==2.1.0rc6
    openai==1.93.0
    protobuf>=5,<6
    open-aea-test-autonomy==0.21.12rc4
    ipfshttpclient==0.8.0a2
    open-aea-cli-ipfs==2.1.0rc6
    requests==2.32.5
    pytest-asyncio==1.3.0
    ecdsa>=0.15
    certifi==2026.2.25
    multidict==6.7.1
    py-eth-sig-utils==0.4.0
    web3<8,>=7.0.0
    eth_typing==5.2.1
    pytz==2022.2.1
    hexbytes==1.3.1
    packaging==26.0
    openapi-core==0.22.0
    openapi-spec-validator>=0.7.0,<0.8.0
    tiktoken>=0.9.0
    click==8.2.1 # Needed to be pinned here until it's not pinned in open-aea
    setuptools<81

[testenv]
basepython = python3
whitelist_externals = /bin/sh
passenv = *
extras = all
deps = {[deps-packages]deps}
setenv =
    PYTHONHASHSEED=0
    PACKAGES_PATHS = packages
    SERVICE_SPECIFIC_PACKAGES = packages/valory/contracts/fpmm_deterministic_factory packages/valory/skills/market_creation_manager_abci packages/valory/skills/market_maker_abci packages/valory/contracts/fpmm
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync
    pytest -rfE --doctest-modules tests/ --cov=packages --cov-report=xml --cov-report=term --cov-report=term-missing --cov-config=.coveragerc {posargs}


