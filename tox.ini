[testenv:bandit]
skipsdist = True
skip_install = True
deps =
    pbr
    tomte[bandit]==0.6.1
commands =
    bandit -s B101 -r {env:SERVICE_SPECIFIC_PACKAGES}
    bandit -s B101 -r scripts

[testenv:black]
skipsdist = True
skip_install = True
deps = tomte[black]==0.6.1
commands = black {env:SERVICE_SPECIFIC_PACKAGES} scripts

[testenv:black-check]
skipsdist = True
skip_install = True
deps = tomte[black]==0.6.1
commands = black --check {env:SERVICE_SPECIFIC_PACKAGES} scripts

[testenv:isort]
skipsdist = True
skip_install = True
deps = tomte[isort]==0.6.1
commands =
    isort {env:SERVICE_SPECIFIC_PACKAGES} --gitignore
    isort market_approval_server/
    isort notebooks/
    isort scripts/

[testenv:isort-check]
skipsdist = True
skip_install = True
deps = tomte[isort]==0.6.1
commands = isort --check-only --gitignore {env:SERVICE_SPECIFIC_PACKAGES} market_approval_server notebooks scripts

[testenv:check-hash]
skipsdist = True
usedevelop = True
deps =
    open-autonomy[all]==0.21.12rc4
    jsonschema<5.0.0,>=4.23.0
    multiaddr==0.0.9
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync --all
    autonomy packages lock --check

[testenv:check-packages]
skipsdist = True
usedevelop = True
deps = {[deps-packages]deps}
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync --all
    autonomy check-packages

[testenv:check-dependencies]
skipsdist = True
usedevelop = True
allowlist_externals = {toxinidir}/scripts/check_dependencies.py
commands =
    autonomy packages sync --all
    {toxinidir}/scripts/check_dependencies.py

[testenv:flake8]
skipsdist = True
skip_install = True
deps =
    tomte[flake8]==0.6.1
    tomte[flake8-docstrings]==0.6.1
commands =
    flake8 {env:SERVICE_SPECIFIC_PACKAGES}
    flake8 market_approval_server
    flake8 notebooks
    flake8 scripts

[testenv:mypy]
skipsdist = True
skip_install = True
deps =
    tomte[mypy]==0.6.1
    types-python-dateutil==2.9.0.20251115
commands =
    mypy {env:SERVICE_SPECIFIC_PACKAGES} --disallow-untyped-defs --config-file tox.ini
    mypy scripts --disallow-untyped-defs --config-file tox.ini

[testenv:pylint]
allowlist_externals = /bin/sh
skipsdist = True
deps =
    {[deps-packages]deps}
    tomte[pylint]==0.6.1
    setuptools<=81.0.0
commands = pylint --ignore-patterns=".*_pb2.py" --ignore-paths="^packages/valory/.*$" --disable=C0103,R0801,R0912,C0301,C0201,C0204,C0209,W1203,C0302,R1735,R1729,W0511 {env:SERVICE_SPECIFIC_PACKAGES} market_approval_server scripts

[testenv:safety]
skipsdist = True
skip_install = True
deps =
    tomte[safety]==0.6.1
    marshmallow==3.26.2
    typer<=0.16
    filelock>=3.20.1
commands = safety check -i 37524 -i 38038 -i 37776 -i 38039 -i 39621 -i 40291 -i 39706 -i 41002 -i 51358 -i 51499 -i 67599 -i 70612 -i 83159

[testenv:darglint]
skipsdist = True
skip_install = True
deps = tomte[darglint]==0.6.1
commands = darglint market_approval_server notebooks scripts {env:SERVICE_SPECIFIC_PACKAGES}/*

[testenv:check-generate-all-protocols]
