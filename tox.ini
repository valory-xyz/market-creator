[testenv:bandit]
skipsdist = True
skip_install = True
deps = 
    pbr
    tomte[bandit]==0.6.1
commands =
    bandit -s B101 -r {env:SERVICE_SPECIFIC_PACKAGES}
    bandit -s B101 -r scripts
    bandit -s B101 -r notebooks
    bandit -s B101 -r market_approval_server

[testenv:black]
skipsdist = True
skip_install = True
deps = tomte[black]==0.6.1
commands = black {env:SERVICE_SPECIFIC_PACKAGES} scripts notebooks market_approval_server

[testenv:black-check]
skipsdist = True
skip_install = True
deps = tomte[black]==0.6.1
commands = black --check {env:SERVICE_SPECIFIC_PACKAGES} scripts notebooks market_approval_server

[testenv:isort]
skipsdist = True
skip_install = True
deps = tomte[isort]==0.6.1
commands =
    isort {env:SERVICE_SPECIFIC_PACKAGES} --gitignore --profile black
    isort scripts/ --profile black
    isort notebooks/ --profile black
    isort market_approval_server/ --profile black

[testenv:isort-check]
skipsdist = True
skip_install = True
deps = tomte[isort]==0.6.1
commands = isort --check-only --gitignore --profile black {env:SERVICE_SPECIFIC_PACKAGES} scripts notebooks market_approval_server

[testenv:check-hash]
skipsdist = True
skip_install = True
deps = {[testenv]deps}
commands = python -m autonomy.cli packages lock --check {posargs}

[testenv:check-packages]
skipsdist = True
skip_install = True
deps = {[testenv]deps}
setenv =
    PYTHONPATH = {toxinidir}
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync
    autonomy check-packages

[testenv:check-dependencies]
skipsdist = True
usedevelop = True
commands =
    autonomy packages sync
    {toxinidir}/scripts/check_dependencies.py

[testenv:flake8]
skipsdist = True
skip_install = True
deps = 
    tomte[flake8]==0.6.1
    setuptools<81
commands =
    flake8 {env:SERVICE_SPECIFIC_PACKAGES}
    flake8 scripts
    flake8 notebooks
    flake8 market_approval_server

[testenv:mypy]
skipsdist = True
skip_install = True
deps =
    {[testenv]deps}
    tomte[mypy]==0.6.1
commands = mypy packages/valory/contracts/fpmm_deterministic_factory packages/valory/skills/market_creation_manager_abci packages/valory/skills/market_maker_abci packages/valory/contracts/fpmm --disallow-untyped-defs --config-file tox.ini


[testenv:pylint]
whitelist_externals = /bin/sh
skipsdist = True
skip_install = True
deps =
    {[deps-packages]deps}
    tomte[pylint]==0.6.1
commands = pylint --ignore-patterns=".*_pb2.py" --ignore-paths="^packages/valory/.*$" --disable=C0103,R0801,R0912,C0301,C0201,C0204,C0209,W1203,C0302,R1735,R1729,W0511,E0401 {env:SERVICE_SPECIFIC_PACKAGES} scripts notebooks market_approval_server

[testenv:safety]
skipsdist = True
skip_install = True
deps = 
    tomte[safety]==0.6.1
    marshmallow==3.26.2
    typer<=0.16
    filelock>=3.20.1
    pip>=25.2
commands = safety check -i 37524 -i 38038 -i 37776 -i 38039 -i 39621 -i 40291 -i 39706 -i 41002 -i 51358 -i 51499 -i 67599 -i 70612

[testenv:darglint]
skipsdist = True
skip_install = True
deps = tomte[darglint]==0.6.1
