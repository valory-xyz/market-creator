; By default, testenvs are configured to:
; - don't skip dist (skipsdist = False)
; - don't skip the package installation (skip_install = False)
; - don't use source installation (usedevelop = False)
; where one of those steps is not necessary for the test,
; we set the associated flag (e.g. for linting we don't need
; the package installation).
[tox]
envlist = bandit, safety, black, black-check, isort, isort-check, check-hash, check-packages, check-dependencies, flake8, mypy, pylint, darglint, check-generate-all-protocols, check-abciapp-specs, check-abci-docstrings, check-handlers, py{3.10,3.11,3.12,3.13,3.14}-{win,linux,darwin}
; when running locally we don't want to fail for no good reason
skip_missing_interpreters = true
isolated_build = True

[deps-tests]
deps =
    tomte[tests]==0.6.1

[deps-packages]
deps =
    {[deps-tests]deps}
    open-autonomy==0.21.12rc4
    toml==0.10.2
    hypothesis==6.151.9
    grpcio==1.78.0
    typing_extensions<=4.15.0,>=3.10.0.2
    py-ecc==8.0.0
    aiohttp<4.0.0,>=3.8.5
    asn1crypto<1.5.0,>=1.4.0
    open-aea-ledger-ethereum==2.1.0rc6
    open-aea-ledger-cosmos==2.1.0rc6
    openai==1.93.0
    protobuf>=5,<6
    open-aea-test-autonomy==0.21.12rc4
    ipfshttpclient==0.8.0a2
    open-aea-cli-ipfs==2.1.0rc6
    requests==2.32.5
    pytest-asyncio==1.3.0
    ecdsa>=0.15
    certifi==2026.2.25
    multidict==6.7.1
    py-eth-sig-utils==0.4.0
    web3<8,>=7.0.0
    eth_typing==5.2.1
    pytz==2022.2.1
    hexbytes==1.3.1
    packaging==26.0
    openapi-core==0.22.0
    openapi-spec-validator>=0.7.0,<0.8.0
    tiktoken>=0.9.0
    click>=8.1.0,<9
    setuptools<81

[deps-base]
deps ={[deps-packages]deps}

[testenv-multi-ubuntu]
deps = {[deps-base]deps}

[testenv-multi-win]
deps =
    {[deps-base]deps}
    pywin32==311
    websocket-client==0.59.0
    idna==3.3

[testenv-multi-darwin]
deps = {[deps-base]deps}

[extra-deps]
deps =
    attrs
    dateutil<4,>=2
    eth-account<0.14.0,>=0.13.0
    google-generativeai==0.8.2
    httpx<1,>=0.23.0
    open-aea-test-autonomy==0.21.12rc4
    py-builder-relayer-client==0.0.1
    py-clob-client==0.34.5
    py-order-utils==0.3.2
    py_builder_signing_sdk<1,>=0.0.1
    pyinstaller==6.19.0
    python-dateutil<4,>=2
    pyyaml<7.0.0,>=6.0.0
    typing-extensions==4.13.2
    urllib3<3,>=1.21.1
    werkzeug
; end-extra

[testenv]
basepython = python3
allowlist_externals = /bin/sh
deps = {[deps-base]deps}
passenv = *
setenv =
    PYTHONHASHSEED=0
    PYTHONPATH={env:PWD:%CD%}
    PACKAGES_PATHS = packages/valory
    SKILLS_PATHS = {env:PACKAGES_PATHS}/skills
    CONNECTION_PATHS = {env:PACKAGES_PATHS}/connections
    SERVICE_SPECIFIC_PACKAGES = {env:SKILLS_PATHS}/market_creation_manager_abci {env:SKILLS_PATHS}/market_maker_abci
    CONTRACTS_PATHS = {env:PACKAGES_PATHS}/contracts

[commands-base]
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync --all

[commands-packages]
commands =
    {[commands-base]commands}
    pytest -rfE {env:SKILLS_PATHS}/market_creation_manager_abci/tests --cov={env:SKILLS_PATHS}/market_creation_manager_abci --cov-report=xml --cov-report=term --cov-report=term-missing --cov-config=.coveragerc {posargs}
    pytest -rfE {env:SKILLS_PATHS}/market_maker_abci/tests --cov={env:SKILLS_PATHS}/market_maker_abci --cov-report=xml --cov-report=term --cov-report=term-missing --cov-config=.coveragerc {posargs}

[testenv:py3.10-linux]
basepython = python3.10
platform=^linux$
deps = {[testenv-multi-ubuntu]deps}
commands = {[commands-packages]commands}

[testenv:py3.11-linux]
basepython = python3.11
platform=^linux$
deps = {[testenv-multi-ubuntu]deps}
commands = {[commands-packages]commands}

[testenv:py3.10-win]
basepython = python3.10
platform=^win32$
deps = {[testenv-multi-win]deps}
commands = {[commands-packages]commands}

[testenv:py3.11-win]
basepython = python3.11
platform=^win32$
deps = {[testenv-multi-win]deps}
commands = {[commands-packages]commands}

[testenv:py3.10-darwin]
basepython = python3.10
platform=^darwin$
deps = {[testenv-multi-darwin]deps}
commands = {[commands-packages]commands}

[testenv:py3.11-darwin]
basepython = python3.11
platform=^darwin$
deps = {[testenv-multi-darwin]deps}
commands = {[commands-packages]commands}

[testenv:py3.12-linux]
basepython = python3.12
platform=^linux$
deps = {[testenv-multi-ubuntu]deps}
commands = {[commands-packages]commands}

[testenv:py3.12-win]
basepython = python3.12
platform=^win32$
deps = {[testenv-multi-win]deps}
commands = {[commands-packages]commands}

[testenv:py3.12-darwin]
basepython = python3.12
platform=^darwin$
deps = {[testenv-multi-darwin]deps}
commands = {[commands-packages]commands}

[testenv:py3.13-linux]
basepython = python3.13
platform=^linux$
deps = {[testenv-multi-ubuntu]deps}
commands = {[commands-packages]commands}

[testenv:py3.13-win]
basepython = python3.13
platform=^win32$
deps = {[testenv-multi-win]deps}
commands = {[commands-packages]commands}

[testenv:py3.13-darwin]
basepython = python3.13
platform=^darwin$
deps = {[testenv-multi-darwin]deps}
commands = {[commands-packages]commands}

[testenv:py3.14-linux]
basepython = python3.14
platform=^linux$
